<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uncle Obi AI</title>
    <style>
        :root {
            --bg: #090d16;
            --card: #131c2e;
            --border: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        body {
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        .container {
            width: 100%;
            max-width: 700px;
            text-align: center;
        }
        .brand {
            margin-bottom: 2.5rem;
        }
        .brand h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            margin-bottom: 0.5rem;
        }
        .brand h1 span {
            color: var(--accent);
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }
        .brand p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }
        .search-wrapper {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 0.5rem 0.75rem;
            border-radius: 24px;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        .search-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
        }
        input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            padding: 1rem;
            font-size: 1.2rem;
        }
        input::placeholder {
            color: #475569;
        }
        button {
            background: var(--accent);
            color: #090d16;
            border: none;
            padding: 1rem 2rem;
            border-radius: 18px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        button:hover {
            transform: scale(1.02);
            opacity: 0.95;
        }
        .status-msg {
            display: none;
            margin-top: 1.5rem;
            color: var(--accent);
            font-weight: 500;
            animation: pulse 1.5s infinite;
        }
        .response-card {
            display: none;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2rem;
            margin-top: 2.5rem;
            text-align: left;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .response-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.75rem;
            margin-bottom: 1rem;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .speak-btn {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .speak-btn:hover {
            background: rgba(56, 189, 248, 0.1);
        }
        .response-text {
            font-size: 1.15rem;
            line-height: 1.7;
            white-space: pre-wrap;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="brand">
            <h1>Uncle Obi <span>AI</span></h1>
            <p>Your custom, intelligent knowledge assistant</p>
        </div>

        <div class="search-wrapper">
            <input type="text" id="queryInput" placeholder="Ask Uncle Obi AI a question..." onkeypress="checkEnter(event)">
            <button onclick="fetchAIResponse()">Ask AI</button>
        </div>

        <div class="status-msg" id="statusBox">Consulting intelligence network...</div>

        <div class="response-card" id="replyCard">
            <div class="response-header">
                <span>Response Matrix</span>
                <button class="speak-btn" onclick="speakText()">🔊 Speak Answer</button>
            </div>
            <div class="response-text" id="replyText"></div>
        </div>
    </div>

    <script>
        let currentResponseText = "";

        async function fetchAIResponse() {
            const promptInput = document.getElementById('queryInput').value.trim();
            const replyCard = document.getElementById('replyCard');
            const replyText = document.getElementById('replyText');
            const statusBox = document.getElementById('statusBox');

            if (!promptInput) return;

            statusBox.style.display = 'block';
            replyCard.style.display = 'none';
            window.speechSynthesis.cancel();

            try {
                // Secure secure POST request pipeline that handles browser connection smoothly
                const response = await fetch("https://pollinations.ai", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        messages: [
                            { role: "system", content: "You are Uncle Obi AI, an elite, brilliant personal assistant designed exclusively to help Uncle Obi. Be smart, clear, and direct." },
                            { role: "user", content: promptInput }
                        ],
                        model: "openai"
                    })
                });

                if (!response.ok) throw new Error("API Network error");
                
                const data = await response.text();
                statusBox.style.display = 'none';
                replyCard.style.display = 'block';

                currentResponseText = data.trim();
                typeEffect(replyText, currentResponseText);
                
            } catch (err) {
                statusBox.style.display = 'none';
                replyCard.style.display = 'block';
                currentResponseText = "Connection reset. Please click 'Ask AI' again in a moment!";
                replyText.innerText = currentResponseText;
            }
        }

        function typeEffect(element, text) {
            element.innerText = "";
            let i = 0;
            function type() {
                if (i < text.length) {
                    element.innerText += text.charAt(i);
                    i++;
                    setTimeout(type, 12);
                }
            }
            type();
        }

        function speakText() {
            if (!currentResponseText) return;
            const utterance = new SpeechSynthesisUtterance(currentResponseText);
            window.speechSynthesis.speak(utterance);
        }

        function checkEnter(e) {
            if (e.key === 'Enter') fetchAIResponse();
        }
    </script>
</body>
</html>
